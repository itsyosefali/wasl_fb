services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: meta
      POSTGRES_PASSWORD: meta
      POSTGRES_DB: meta_gateway
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./seed:/seed:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U meta -d meta_gateway"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5

  nats:
    image: nats:2.10-alpine
    command: ["-js", "-m", "8222"]
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8222/healthz"]
      interval: 5s
      timeout: 3s
      retries: 5

  migrate:
    image: migrate/migrate:v4.18.2
    volumes:
      - ./migrations:/migrations:ro
    command:
      - "-path=/migrations"
      - "-database=postgres://meta:meta@postgres:5432/meta_gateway?sslmode=disable"
      - "up"
    depends_on:
      postgres:
        condition: service_healthy

  webhook-catcher:
    image: mendhak/http-https-echo:31
    ports:
      - "8090:8080"
    environment:
      HTTP_PORT: 8080

  api: &api-env
    build: .
    command: ["/bin/api"]
    ports:
      - "8080:8080"
    environment: &shared-env
      DATABASE_URL: postgres://meta:meta@postgres:5432/meta_gateway?sslmode=disable
      REDIS_URL: redis://redis:6379/0
      NATS_URL: nats://nats:4222
      META_APP_SECRET: ${META_APP_SECRET:-your-meta-app-secret}
      META_VERIFY_TOKEN: ${META_VERIFY_TOKEN:-your-meta-verify-token}
      META_GRAPH_VERSION: ${META_GRAPH_VERSION:-v23.0}
      META_APP_ID: ${META_APP_ID:-}
      META_OAUTH_REDIRECT_URL: ${META_OAUTH_REDIRECT_URL:-http://localhost:8080/auth/facebook/callback}
      META_OAUTH_SCOPES: ${META_OAUTH_SCOPES:-pages_show_list,pages_messaging,pages_manage_metadata,pages_read_engagement,pages_manage_engagement,business_management}
      OAUTH_SUCCESS_REDIRECT: ${OAUTH_SUCCESS_REDIRECT:-}
      API_PUBLIC_URL: ${API_PUBLIC_URL:-http://localhost:8080}
      ENCRYPTION_KEY: ${ENCRYPTION_KEY:-0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef}
      RATE_LIMIT_REQUESTS: ${RATE_LIMIT_REQUESTS:-100}
      RATE_LIMIT_WINDOW_SECONDS: ${RATE_LIMIT_WINDOW_SECONDS:-60}
      DELIVERY_MAX_ATTEMPTS: ${DELIVERY_MAX_ATTEMPTS:-5}
      DELIVERY_BACKOFF_SECONDS: ${DELIVERY_BACKOFF_SECONDS:-1,5,30,120,600}
    depends_on:
      migrate:
        condition: service_completed_successfully
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "kill -0 1 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 3
      start_period: 5s

  worker:
    build: .
    command: ["/bin/worker"]
    environment:
      <<: *shared-env
    depends_on:
      migrate:
        condition: service_completed_successfully
      api:
        condition: service_started
      redis:
        condition: service_healthy
      nats:
        condition: service_healthy

  web:
    build: ./frontend
    ports:
      - "5173:5173"
    environment:
      VITE_API_URL: ${API_PUBLIC_URL:-http://localhost:8080}
      VITE_API_KEY: ${VITE_API_KEY:-demo-api-key-change-in-production}
      VITE_META_APP_ID: ${META_APP_ID:-}
    depends_on:
      api:
        condition: service_started

volumes:
  pgdata:
